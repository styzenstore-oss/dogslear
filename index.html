<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Digital </title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b1020;
color:white;
}

header{
text-align:center;
padding:50px 20px;
background:linear-gradient(135deg,#111936,#1c2c66);
}

header h1{
font-size:50px;
color:#00d4ff;
text-shadow:0 0 15px #00d4ff;
}

header p{
margin-top:10px;
color:#ccc;
}

.reputasi{
text-align:center;
padding:15px;
background:#121a35;
color:#00ff9d;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#121a35;
border-radius:15px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #00d4ff55;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-size:22px;
color:#00ff9d;
margin:10px 0;
}

select,button,input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

select,input,textarea{
background:#1b264d;
color:white;
}

button{
background:linear-gradient(90deg,#00d4ff,#7b3cff);
color:white;
font-weight:bold;
cursor:pointer;
}

.cart,.feedback{
background:#121a35;
padding:20px;
border-radius:15px;
margin-top:30px;
}

.checkout{
background:#25D366;
margin-top:15px;
}

.comment{
background:#1b264d;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>
<body>

<header>
<h1>🚀 Digital Store</h1>
<p>Produk Digital Premium & Terpercaya</p>
</header>

<div class="reputasi">
⭐⭐⭐⭐⭐ Rating 4.9 | 10.000+ Transaksi Berhasil | Fast Response
</div>

<div class="container">

<div class="products" id="products"></div>

<div class="cart">
<h2>🛒 Keranjang Belanja</h2>
<ul id="cartList"></ul>
<h3>Total: Rp <span id="total">0</span></h3>
<button class="checkout" onclick="checkoutWA()">
Checkout via WhatsApp
</button>
</div>

<div class="feedback">
<h2>💬 Kritik & Saran</h2>

<input type="text" id="nama" placeholder="Nama">

<textarea id="pesan" placeholder="Tulis kritik atau saran"></textarea>

<button onclick="kirimFeedback()">Kirim</button>

<div id="feedbackList"></div>

</div>

</div>

<script>

const nomorWA = "6281234567890";

const products = [

[
  {
    "name": "Script Bot WhatsApp",
    "price": 50000,
    "image": "https://picsum.photos/400/300?1https://files.catbox.moe/c8tq1u.png",
    "variants": ["Germany", "United Kingdom", "France"]
  },
  {
    "name": "Canva Pro",
    "image": "https://picsum.photos/400/300?2",
    "variants": ["1 Bulan 2500", "3 Bulan 5000", "12 Bulan 15000"]
  },
]

];

let cart=[];

function renderProducts(){

document.getElementById("products").innerHTML=
products.map((p,i)=>`

<div class="card">

<img src="${p.image}">

<div class="card-content">

<h3>${p.name}</h3>

<div class="price">
Rp ${p.price.toLocaleString()}
</div>

<select id="v${i}">
${p.variants.map(v=>`<option>${v}</option>`).join("")}
</select>

<button onclick="addCart(${i})">
Tambah Keranjang
</button>

</div>
</div>

`).join("");

}

function addCart(i){

cart.push({
name:products[i].name,
price:products[i].price,
variant:document.getElementById("v"+i).value
});

renderCart();

}

function renderCart(){

let total=0;

document.getElementById("cartList").innerHTML=
cart.map(item=>{

total+=item.price;

return `
<li>
${item.name} - ${item.variant}
(Rp ${item.price.toLocaleString()})
</li>
`;

}).join("");

document.getElementById("total").innerText=
total.toLocaleString();

}

function checkoutWA(){

if(cart.length===0){
alert("Keranjang kosong");
return;
}

let total=0;

let pesan=
"🧾 *INVOICE DIGITAL STORE*%0A%0A";

cart.forEach((item,i)=>{

pesan+=`${i+1}. ${item.name}%0A`;
pesan+=`Varian : ${item.variant}%0A`;
pesan+=`Harga : Rp ${item.price.toLocaleString()}%0A%0A`;

total+=item.price;

});

pesan+=`💰 TOTAL : Rp ${total.toLocaleString()}%0A`;
pesan+=`%0ATerima kasih telah berbelanja di Digital Store 🙏`;

window.open(
`https://wa.me/${nomorWA}?text=${pesan}`,
"_blank"
);

}

function kirimFeedback(){

let nama=document.getElementById("nama").value;
let pesan=document.getElementById("pesan").value;

if(!nama || !pesan) return;

let data=
JSON.parse(localStorage.getItem("feedback"))||[];

data.unshift({nama,pesan});

localStorage.setItem(
"feedback",
JSON.stringify(data)
);

document.getElementById("nama").value="";
document.getElementById("pesan").value="";

loadFeedback();

}

function loadFeedback(){

let data=
JSON.parse(localStorage.getItem("feedback"))||[];

document.getElementById("feedbackList").innerHTML=
data.map(d=>`
<div class="comment">
<b>${d.nama}</b><br>
${d.pesan}
</div>
`).join("");

}

renderProducts();
loadFeedback();

</script>

</body>
</html>
